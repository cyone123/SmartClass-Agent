services:
  frontend:
    build:
      context: ./frontend
    image: smartclass-frontend:local
    depends_on:
      backend:
        condition: service_healthy
      onlyoffice:
        condition: service_started
    ports:
      - "${FRONTEND_BIND:-0.0.0.0}:${FRONTEND_PORT:-8080}:80"
    networks:
      - smartclass
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: smartclass-backend:local
    env_file:
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartclass}:${POSTGRES_PASSWORD:-smartclass_dev_password}@postgres:5432/${POSTGRES_DB:-smartclass}
      FILE_STORAGE_ROOT: /app/storage
      SKILLS_ROOT: /app/skills
      VIDEO_FFMPEG_BIN: ffmpeg
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      STORAGE_DOWNLOAD_MODE: ${STORAGE_DOWNLOAD_MODE:-proxy}
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-smartclass}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-smartclass}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-smartclass_minio_password}
      MINIO_SECURE: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
      PROMETHEUS_METRICS_PATH: ${PROMETHEUS_METRICS_PATH:-/metrics}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    volumes:
      - backend_storage:/app/storage
    ports:
      - "${DEBUG_BIND:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - smartclass
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartclass}
      POSTGRES_USER: ${POSTGRES_USER:-smartclass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartclass_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DEBUG_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - smartclass
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-smartclass}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-smartclass_minio_password}
    volumes:
      - minio_data:/data
    ports:
      - "${DEBUG_BIND:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${DEBUG_BIND:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - smartclass
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-smartclass}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-smartclass_minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-smartclass}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "Waiting for MinIO to become ready..."
          sleep 2
        done
        mc mb --ignore-existing "local/$$MINIO_BUCKET"
    networks:
      - smartclass
    restart: "no"

  onlyoffice:
    image: onlyoffice/documentserver:latest
    environment:
      JWT_ENABLED: "false"
    ports:
      - "${DEBUG_BIND:-127.0.0.1}:${ONLYOFFICE_PORT:-8082}:80"
    networks:
      - smartclass
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docker/observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "${DEBUG_BIND:-127.0.0.1}:${OTEL_GRPC_PORT:-4317}:4317"
      - "${DEBUG_BIND:-127.0.0.1}:${OTEL_HTTP_PORT:-4318}:4318"
    networks:
      - smartclass
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${DEBUG_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - smartclass
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-smartclass_grafana_password}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${DEBUG_BIND:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - smartclass
    restart: unless-stopped

networks:
  smartclass:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  backend_storage:
  grafana_data:
